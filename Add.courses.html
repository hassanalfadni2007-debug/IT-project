<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Course</title>
    <link rel="stylesheet" href="add courses.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>
<body>
     <nav class="navbar">
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="My courses.html">My Courses</a></li>
        <li><a href="Add.courses.html">Add Course</a></li>
        <li><a href="contact us.html" >Contact Us</a></li>
    </ul>
</nav>
    <section class="add-course-section">
        <div class="container">
            <h1>Add New Course</h1>
            <p class="subtitle">
                Here you can add a new course by filling out the form below
            </p>
            <div class="form-box">
                <form>
                    <label>Course Name</label>
                    <input type="text" placeholder="Enter course name">
                    <label>Instructor Name</label>
                    <input type="text" placeholder="Enter instructor name">
                    <label>Hours</label>
                    <input type="number" placeholder="Enter number of hours">
                    <label>Notes</label>
                    <textarea placeholder="Write notes about the course"></textarea>
                    <button type="submit">Add Course</button>
                </form>
            </div>
        </div>
    </section>
</body>
</html>
